<svg viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Relyance Solutions">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9DE3FF"/>
      <stop offset="50%" stop-color="#4FC3FF"/>
      <stop offset="100%" stop-color="#2D6CFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Logo Mark -->
  <!-- Outer R -->
  <path d="M8 68 V16 H34 C44 16 50 23 50 32 C50 41 44 48 34 48 H18"
        stroke="url(#lg)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <path d="M30 48 L50 68"
        stroke="url(#lg)" stroke-width="4.5" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <!-- Inner R -->
  <path d="M14 62 V22 H32 C40 22 45 28 45 32 C45 38 40 43 32 43 H22"
        stroke="url(#lg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.45"/>
  <path d="M29 43 L44 62"
        stroke="url(#lg)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.45"/>
  <!-- Circuit nodes -->
  <circle cx="8"  cy="16" r="2.4" fill="url(#lg)" filter="url(#glow)"/>
  <circle cx="34" cy="16" r="2.4" fill="url(#lg)" filter="url(#glow)"/>
  <circle cx="50" cy="32" r="2.4" fill="url(#lg)" filter="url(#glow)"/>
  <circle cx="18" cy="48" r="2.4" fill="url(#lg)" filter="url(#glow)"/>
  <circle cx="8"  cy="68" r="2.4" fill="url(#lg)" filter="url(#glow)"/>
  <circle cx="50" cy="68" r="2.4" fill="url(#lg)" filter="url(#glow)"/>
  <!-- Trace accents -->
  <path d="M0 23 H5 L7 21 H8"   stroke="url(#lg)" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M55 38 H60 L62 40"   stroke="url(#lg)" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Wordmark -->
  <text x="72" y="37" font-family="Inter, sans-serif" font-size="20" font-weight="700"
        letter-spacing="2" fill="#EDEEF2">RELYANCE</text>
  <text x="72" y="58" font-family="Inter, sans-serif" font-size="12" font-weight="500"
        letter-spacing="4" fill="#4FC3FF">SOLUTIONS</text>

  <!-- Tagline separator decorators -->
  <line x1="72" y1="65" x2="78" y2="65" stroke="#4FC3FF" stroke-width="1" opacity="0.6"/>
  <text x="82" y="69" font-family="Inter, sans-serif" font-size="8" font-weight="400"
        letter-spacing="1.5" fill="#8892A4">SMART SOLUTIONS. REAL RESULTS.</text>
</svg>
